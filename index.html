<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Puufu — Giriş/Çıkış</title>
<meta name="theme-color" content="#da274d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Puufu Giriş">
<link rel="apple-touch-icon" href="https://www.puufu.com.tr/Content/images/puufu-social-card-512.png">
<link rel="manifest" href="/cafetime/manifest-staff.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, addDoc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const db = getFirestore(initializeApp({
  apiKey:"AIzaSyABJUsVfdXIKBLECWP_U0s7YxhLh_JSDm4",
  authDomain:"staff-time-track.firebaseapp.com",
  projectId:"staff-time-track",
  storageBucket:"staff-time-track.firebasestorage.app",
  messagingSenderId:"700353318316",
  appId:"1:700353318316:web:dea92b89952064ba427e09"
}));
window._db=db;
window._fs={collection,doc,getDocs,setDoc,addDoc,updateDoc};
window.dispatchEvent(new Event('db-ready'));
</script>
<style>
:root{
  --red:#da274d;--red-d:#b81f3f;--red-s:#fce8ed;
  --green:#0f9d58;--green-s:#e6f4ee;
  --text:#111;--muted:#777;--line:#e8e8ea;--off:#f5f5f6;--white:#fff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Instrument Sans',sans-serif;background:var(--off);color:var(--text);min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}

.page{display:none;min-height:100dvh;flex-direction:column}
.page.active{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.hdr{background:var(--red);padding:22px 24px 20px;text-align:center}
.hdr-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-.5px}
.hdr-sub{font-size:.78rem;color:rgba(255,255,255,.6);margin-top:3px}

/* CONTENT */
.content{flex:1;padding:28px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* STEP LABEL */
.slabel{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:18px;text-align:center}

/* STAFF GRID */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:360px}
.sbtn{background:#fff;border:2px solid var(--line);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:border-color .15s,transform .1s,box-shadow .15s;cursor:pointer;text-align:center}
.sbtn:active{transform:scale(.95)}
.sbtn.sel{border-color:var(--red);box-shadow:0 0 0 3px var(--red-s)}
.sav{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff}
.sname{font-weight:600;font-size:.9rem}
.srole{font-size:.7rem;color:var(--muted)}
.sstatus{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--off);color:var(--muted)}
.sstatus.on{background:var(--green-s);color:var(--green)}

/* PIN CARD */
.pwcard{background:#fff;border-radius:24px;padding:24px 22px 20px;width:100%;max-width:340px;box-shadow:0 4px 28px rgba(0,0,0,.09)}

/* Who bar */
.pwwho{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pwav{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0}
.pwname{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800}
.pwrole{font-size:.73rem;color:var(--muted)}

/* Status bar */
.statusbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:20px;font-size:.8rem;font-weight:600}
.statusbar.in{background:var(--green-s);color:var(--green)}
.statusbar.out{background:var(--red-s);color:var(--red)}

/* Action label */
.action-label{text-align:center;margin-bottom:20px;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;padding:10px 16px;border-radius:10px}
.action-label.ci{background:var(--red-s);color:var(--red)}
.action-label.co{background:var(--off);color:var(--text)}

/* PIN dots — tappable to open keyboard */
.pin-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;text-align:center;margin-bottom:18px}
.pin-dots-wrap{position:relative;display:flex;justify-content:center;gap:18px;margin-bottom:10px;cursor:pointer;padding:16px 0}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--line);background:transparent;transition:background .12s,border-color .12s,transform .12s;pointer-events:none}
.pin-dot.filled{background:var(--red);border-color:var(--red);transform:scale(1.15)}
.pin-dot.error{background:#ff4444;border-color:#ff4444;animation:shake .4s ease}
.pin-hint{text-align:center;font-size:.73rem;color:var(--muted);margin-bottom:18px}
.pin-hint.active{color:var(--red);font-weight:600}

/* Hidden real input */
.pin-real-input{
  position:fixed;left:-9999px;top:0;
  opacity:0;width:1px;height:1px;
  font-size:16px;/* prevent iOS zoom */
}

.pwerr{font-size:.76rem;color:var(--red);font-weight:600;text-align:center;min-height:18px;margin-bottom:8px}
.backbtn{width:100%;padding:11px;border-radius:12px;background:var(--off);color:var(--muted);font-size:.85rem;font-weight:600}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* SUCCESS */
.sucwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:40px 24px;width:100%;max-width:360px}
.sucicon{width:82px;height:82px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.sucicon.in{background:var(--red-s)}
.sucicon.out{background:var(--green-s)}
.sucname{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.sucmsg{font-size:.95rem;color:var(--muted)}
.suctime{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--red);line-height:1}
.sucback{margin-top:8px;padding:13px 36px;border-radius:13px;background:var(--off);color:var(--text);font-size:.9rem;font-weight:700}

/* SPINNER */
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loadwrap{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--muted);font-size:.85rem;padding:40px;grid-column:span 2}
</style>
</head>
<body>

<!-- PAGE 1: SELECT STAFF -->
<div class="page active" id="p-select">
  <div class="hdr">
    <div class="hdr-logo">☕ Puufu</div>
    <div class="hdr-sub" id="d1"></div>
  </div>
  <div class="content">
    <div class="slabel">Kim olduğunuzu seçin</div>
    <div class="sgrid" id="sgrid">
      <div class="loadwrap"><div class="spin"></div>Yükleniyor…</div>
    </div>
  </div>
</div>

<!-- PAGE 2: PIN + ACTION -->
<div class="page" id="p-action">
  <div class="hdr">
    <div class="hdr-logo">☕ Puufu</div>
    <div class="hdr-sub" id="d2"></div>
  </div>
  <div class="content">
    <div class="pwcard">
      <div class="pwwho">
        <div class="pwav" id="pa-av"></div>
        <div><div class="pwname" id="pa-name"></div><div class="pwrole" id="pa-role"></div></div>
      </div>
      <div class="statusbar" id="pa-status"></div>
      <div class="action-label" id="action-label">Giriş Yap</div>
      <div class="pin-label">PIN Kodunuz</div>
      <div class="pin-dots-wrap" id="pin-dots-wrap" onclick="focusPinInput()">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-hint" id="pin-hint">Klavyeyi açmak için dokunun</div>
      <!-- Hidden input - captures native number keyboard -->
      <input class="pin-real-input" id="pin-input"
        type="tel" inputmode="numeric" pattern="[0-9]*"
        maxlength="4" autocomplete="off" autocorrect="off">
      <div class="pwerr" id="pwerr"></div>
      <button class="backbtn" onclick="goBack()">← Personel listesine dön</button>
    </div>
  </div>
</div>

<!-- PAGE 3: SUCCESS -->
<div class="page" id="p-success">
  <div class="hdr">
    <div class="hdr-logo">☕ Puufu</div>
    <div class="hdr-sub" id="d3"></div>
  </div>
  <div class="content">
    <div class="sucwrap">
      <div class="sucicon" id="sico"></div>
      <div class="sucname" id="sname"></div>
      <div class="sucmsg"  id="smsg"></div>
      <div class="suctime" id="stime"></div>
      <button class="sucback" onclick="reset()">Tamam ✓</button>
    </div>
  </div>
</div>

<script>
let db, fs;
function waitDb(){return new Promise(r=>{if(window._db){db=window._db;fs=window._fs;r();}else window.addEventListener('db-ready',()=>{db=window._db;fs=window._fs;r();},{once:true});})}

let allStaff=[], clockStates={}, sel=null;
const COLORS=['#c0392b','#8e44ad','#2980b9','#16a085','#d35400','#7f8c8d','#27ae60','#e67e22'];

async function init(){
  setDates();
  await waitDb();

  // Load staff
  const snap=await fs.getDocs(fs.collection(db,'staff'));
  allStaff=[];
  snap.forEach(d=>allStaff.push({id:d.id,...d.data()}));

  // Seed defaults if empty
  if(!allStaff.length){
    const defs=[
      {name:'Alex',role:'Süpervizör',password:'1111',color:COLORS[0]},
      {name:'Maria',role:'Barista',password:'2222',color:COLORS[1]},
      {name:'James',role:'Barista',password:'3333',color:COLORS[2]},
      {name:'Sofia',role:'Kasiyer',password:'4444',color:COLORS[3]},
      {name:'Leo',role:'Barista',password:'5555',color:COLORS[4]},
      {name:'Nina',role:'Kasiyer',password:'6666',color:COLORS[5]},
    ];
    for(const s of defs){
      const ref=await fs.addDoc(fs.collection(db,'staff'),s);
      allStaff.push({id:ref.id,...s});
    }
  }

  // Load clock states
  const cs=await fs.getDocs(fs.collection(db,'clockStates'));
  clockStates={};
  cs.forEach(d=>clockStates[d.id]=d.data());

  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('sgrid');
  if(!allStaff.length){g.innerHTML='<div style="grid-column:span 2;text-align:center;color:var(--muted);padding:32px;font-size:.85rem">Personel bulunamadı.<br>Yöneticinizle iletişime geçin.</div>';return;}
  g.innerHTML=allStaff.map(s=>{
    const cs=clockStates[s.id];
    const on=!!(cs&&cs.in&&!cs.out);
    return `<button class="sbtn${sel?.id===s.id?' sel':''}" onclick='selectStaff(${JSON.stringify(s)})'>
      <div class="sav" style="background:${s.color||COLORS[0]}">${s.name.slice(0,2).toUpperCase()}</div>
      <div class="sname">${s.name}</div>
      <div class="srole">${s.role}</div>
      <div class="sstatus${on?' on':''}">${on?'● Görevde':'○ Dışarıda'}</div>
    </button>`;
  }).join('');
}

function selectStaff(s){
  if(typeof s==='string')s=JSON.parse(s);
  sel=s;
  localStorage.setItem('cafe_last',s.id);
  const cs=clockStates[s.id];
  const on=!!(cs&&cs.in&&!cs.out);

  document.getElementById('pa-av').style.background=s.color||COLORS[0];
  document.getElementById('pa-av').textContent=s.name.slice(0,2).toUpperCase();
  document.getElementById('pa-name').textContent=s.name;
  document.getElementById('pa-role').textContent=s.role;

  const sb=document.getElementById('pa-status');
  sb.className=`statusbar ${on?'in':'out'}`;
  sb.innerHTML=on?`✅ Görevde, giriş saati: <b style="margin-left:4px">${ft(cs.in)}</b>`:'○ Şu an görevde değil';

  const al=document.getElementById('action-label');
  al.textContent=on?'Çıkış Yap':'Giriş Yap';
  al.className=`action-label ${on?'co':'ci'}`;

  // Reset PIN state
  _pin='';
  const inp=document.getElementById('pin-input');
  inp.value='';
  updDots();
  document.getElementById('pwerr').textContent='';
  document.getElementById('pin-hint').textContent='Klavyeyi açmak için dokunun';
  document.getElementById('pin-hint').classList.remove('active');

  showPage('p-action');
  setTimeout(focusPinInput, 350);
}

let _pin='';

function focusPinInput(){
  const inp=document.getElementById('pin-input');
  inp.value=_pin; // keep existing digits
  inp.focus();
  // Move cursor to end
  inp.setSelectionRange(inp.value.length, inp.value.length);
  document.getElementById('pin-hint').textContent='PIN giriliyor…';
  document.getElementById('pin-hint').classList.add('active');
}

function initPinInput(){
  const inp=document.getElementById('pin-input');
  inp.addEventListener('input',()=>{
    const val=inp.value.replace(/\D/g,'').slice(0,4);
    inp.value=val;
    _pin=val;
    updDots();
    if(val.length===4) setTimeout(submitAction,120);
  });
  inp.addEventListener('blur',()=>{
    document.getElementById('pin-hint').textContent='Klavyeyi açmak için dokunun';
    document.getElementById('pin-hint').classList.remove('active');
  });
  inp.addEventListener('focus',()=>{
    document.getElementById('pin-hint').textContent='PIN giriliyor…';
    document.getElementById('pin-hint').classList.add('active');
  });
}

function updDots(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('pd'+i);
    el.classList.toggle('filled',i<_pin.length);
    el.classList.remove('error');
  }
}
function shakeErr(msg){
  document.getElementById('pwerr').textContent=msg;
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.add('error');
  setTimeout(()=>{
    _pin='';
    const inp=document.getElementById('pin-input');
    inp.value='';
    updDots();
    document.getElementById('pwerr').textContent='';
    focusPinInput();
  },800);
}

async function submitAction(){
  const err=document.getElementById('pwerr');
  if(_pin!==sel.password){ shakeErr('Yanlış PIN — tekrar deneyin'); return; }

  // Blur keyboard, show saving
  document.getElementById('pin-input').blur();
  document.getElementById('pin-hint').textContent='Kaydediliyor…';
  err.textContent='';

  const cs=clockStates[sel.id];
  const on=!!(cs&&cs.in&&!cs.out);
  const now=Date.now();

  try{
    if(!on){
      const ref=await fs.addDoc(fs.collection(db,'sessions'),{staffId:sel.id,in:now,out:null});
      await fs.setDoc(fs.doc(db,'clockStates',sel.id),{in:now,out:null,sid:ref.id});
      clockStates[sel.id]={in:now,out:null,sid:ref.id};
      showSuccess('in',sel,now);
    } else {
      if(cs.sid)await fs.updateDoc(fs.doc(db,'sessions',cs.sid),{out:now});
      else await fs.addDoc(fs.collection(db,'sessions'),{staffId:sel.id,in:cs.in,out:now});
      await fs.setDoc(fs.doc(db,'clockStates',sel.id),{in:cs.in,out:now,sid:cs.sid||null});
      clockStates[sel.id]={in:cs.in,out:now};
      showSuccess('out',sel,now);
    }
  }catch(e){
    document.getElementById('pin-hint').textContent='Klavyeyi açmak için dokunun';
    shakeErr('Bağlantı hatası — tekrar deneyin');
  }
}

function showSuccess(type,staff,ts){
  document.getElementById('sico').textContent=type==='in'?'☕':'👋';
  document.getElementById('sico').className=`sucicon ${type}`;
  document.getElementById('sname').textContent=staff.name;
  document.getElementById('smsg').textContent=type==='in'?'Giriş yapıldı':'Çıkış yapıldı';
  document.getElementById('stime').textContent=ft(ts);
  showPage('p-success');
  setTimeout(reset,4000);
}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goBack(){showPage('p-select');renderGrid();}
function reset(){sel=null;_pin='';document.getElementById('pin-input').value='';showPage('p-select');renderGrid();}
function ft(ts){return new Date(ts).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function fh(ms){if(!ms||ms<=0)return'–';const t=Math.round(ms/60000);const h=Math.floor(t/60),m=t%60;return h>0?`${h}s ${m}d`:`${m}d`;}
function setDates(){const d=new Date().toLocaleDateString('tr-TR',{weekday:'long',month:'long',day:'numeric'});['d1','d2','d3'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=d;});}

initPinInput();

// Register PWA service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/cafetime/sw-staff.js', { scope: '/cafetime/' });
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
}

// Refresh staff list when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && document.getElementById('p-select').classList.contains('active')){
    init();
  }
});

init().catch(()=>{
  document.getElementById('sgrid').innerHTML='<div style="grid-column:span 2;text-align:center;color:#da274d;padding:32px;font-size:.85rem">Bağlantı hatası.<br>Lütfen sayfayı yenileyin.</div>';
});
</script>
</body>
</html>
